<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZACK CODE Logo Preview</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .preview-container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .instructions {
            margin-top: 20px;
            padding: 15px;
            background: #e8f4f8;
            border-radius: 4px;
            font-size: 14px;
            color: #333;
        }
        .instructions h3 {
            margin-top: 0;
        }
        .instructions ol {
            margin: 10px 0;
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class="preview-container">
        <h2 style="text-align: center; margin-bottom: 20px;">ZACK CODE Logo</h2>
        <div style="text-align: center;">
            <img src="zack-code-logo.svg" alt="ZACK CODE Logo" style="max-width: 100%; height: auto;">
        </div>
        <div class="instructions">
            <h3>如何导出为PNG图片：</h3>
            <ol>
                <li>右键点击上面的logo图片</li>
                <li>选择"图片另存为"或"Save image as"</li>
                <li>保存为PNG格式</li>
            </ol>
            <p><strong>或者：</strong></p>
            <ol>
                <li>在浏览器中打开 <code>zack-code-logo.svg</code> 文件</li>
                <li>使用截图工具截图保存</li>
                <li>或使用在线工具（如 <a href="https://convertio.co/svg-png/" target="_blank">convertio.co</a>）将SVG转换为PNG</li>
            </ol>
        </div>
    </div>
</body>
</html>
